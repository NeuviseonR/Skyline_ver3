            "Vietnam": ["Ho Chi Minh City (SGN)", "Hanoi (HAN)", "Da Nang (DAD)"]
        };

        function updateCities(countryId, cityId) {
            const countrySelect = document.getElementById(countryId);
            const citySelect = document.getElementById(cityId);
            const selectedCountry = countrySelect.value;

            citySelect.innerHTML = '<option value="">-- Select City --</option>';

            if (cityData[selectedCountry]) {
                cityData[selectedCountry].forEach(city => {
                    let opt = document.createElement("option");
                    opt.value = city;
                    opt.innerHTML = city;
                    citySelect.appendChild(opt);
                });
            }
        }

        
    </script>
</head>
<body style="height: fit-content;">
    
<div class="allbody" style="display: flex; background-color: #6b9a9d; justify-content: center; align-items: center; min-height: 80vh;">
        <div style="width: 100%; height: 900px; position: relative; display: flex; justify-content: center;">
            <div class="buttons12" style="position: absolute; top: 50px;  border-radius: 15px 15px 0 0;">
                    <div><a href="{{ url_for('addticketsround') }}"  style="background-color: #478294;">Add Round Trip</a></div> 
                    <div><a href="{{ url_for('addtickets') }}">Add One Way</a></div> 
            </div>

            <div class="admin-form-container" style="margin: 95px auto 40px auto; height: fit-content;">
                
                <form action="/addticketsround" method="POST">
                    <div class="form-row">
                        <div class="form-group">                          

                            <label>From Country</label>
                            <select id="from_country" name="from_country" onchange="updateCities('from_country', 'from_city')" required>
                                <option value="">Select Country</option>
                                <option value="Afghanistan">Afghanistan</option>
                                <option value="Vietnam">Vietnam</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>From City</label>
                            <select id="from_city" name="from_city" required>
                                <option value="">Select Country First</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>To Country</label>
                            <select id="to_country" name="to_country" onchange="updateCities('to_country', 'to_city')" required>
                                <option value="">Select Country</option>
                                <option value="Afghanistan">Afghanistan</option>
                                <option value="Vietnam">Vietnam</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>To City</label>
                            <select id="to_city" name="to_city" required>
                                <option value="">Select Country First</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Departure Date</label>
                            <input type="date" name="dep_date" required>
                        </div>
                        <div class="form-group">
                            <label>Departure Time</label>
                            <input type="time" name="dep_time" required>
                        </div>
                        <div class="form-group">
                            <label>Flight Duration</label>
                            <input type="text" name="duration" placeholder="e.g. 12h 30m" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Return Date</label>
                            <input type="date" name="ret_date" required>
                        </div>
                        <div class="form-group">
                            <label>Return Time</label>
                            <input type="time" name="ret_time" required>
                        </div>                        
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Economy Tickets</label>
                            <input type="number" name="tickets_economy" min="0" placeholder="0" required>
                        </div>
                        <div class="form-group">
                            <label>Business Tickets</label>
                            <input type="number" name="tickets_business" min="0" placeholder="0" required>
                        </div>
                        <div class="form-group">
                            <label>First Class Tickets</label>
                            <input type="number" name="tickets_first" min="0" placeholder="0" required>
                        </div>
                        <div class="form-group">
                            <label>Base Price (USD)</label>
                            <input type="number" step="0.01" name="price" required>
                        </div>
                    </div>

                    <div class="promo-section">
                        <h3>Active Promotions</h3>
                        <div class="form-group">
                            <label>Apply Discount/Promo</label>
                            <select name="promo_code">
                                <option value="none">No Promo</option>
                                <option value="XMAS_25">Christmas Sale (25% Off)</option>
                                <option value="FIRST_20">First 20 Passengers (10% Off)</option>
                                <option value="NEW_YEAR">New Year Special (15% Off)</option>
                                <option value="SUMMER_VIBE">Summer Getaway ($50 Flat Off)</option>
                            </select>
                        </div>
                    </div>


                    <button type="submit" class="submit-btn">CREATE FLIGHT TICKET</button>
                </form>
            </div>
         </div>
</div>

    </body>
</html>
